spring.application.name=car_price_prediction_backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_appraisal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ML Service #1
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# CV Service (legacy)
cv.service.url=${CV_SERVICE_URL:http://localhost:8001}

# Orchestrator
orchestrator.url=${ORCHESTRATOR_URL:http://localhost:8003}

# Uploads directory (shared volume ? ?????????????)
uploads.dir=${UPLOADS_DIR:/app/uploads}

# Multipart ? ?????? ??? ???????? ????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# Server
server.port=8080

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# Logging
logging.level.com.petprojects.car_price_prediction_backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
